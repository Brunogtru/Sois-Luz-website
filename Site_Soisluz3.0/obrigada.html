  <style>
    .obrigada__section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: var(--space-6);
      position: relative;
      z-index: var(--z-base);
    }

    .obrigada__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--space-6);
      max-width: 480px;
    }

    .obrigada__icone {
      font-size: var(--fs-2xl);
      color: var(--accent-primary);
      text-shadow: var(--shadow-glow);
      animation: pulso 2s var(--ease-in-out) infinite;
    }

    @keyframes pulso {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.95); }
    }

    .obrigada__titulo {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-light);
      line-height: var(--lh-tight);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .obrigada__destaque {
      font-style: italic;
      color: var(--accent-primary);
      text-shadow:
        0 0 40px rgba(201, 168, 76, 0.4),
        0 0 80px rgba(201, 168, 76, 0.15);
    }

    .obrigada__texto {
      font-family: var(--font-body);
      font-size: var(--fs-base);
      font-weight: var(--fw-light);
      line-height: var(--lh-loose);
      color: var(--text-secondary);
    }

    .obrigada__btn {
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      letter-spacing: var(--ls-wider);
      text-transform: uppercase;
      color: var(--accent-primary);
      text-decoration: none;
      transition: opacity 0.3s var(--ease-out);
    }

    .obrigada__btn:hover {
      opacity: 0.7;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/script.js"></script>

  <script>
  async function atualizarPedido() {
    const params = new URLSearchParams(window.location.search)

    const status          = params.get('status')
    const collectionStatus = params.get('collection_status')
    const paymentId       = params.get('payment_id')
    const externalRef     = params.get('external_reference')

    // Só atualiza se veio do Mercado Pago com referência
    if (!externalRef || !paymentId) return

    const statusMap = {
      'approved': 'aprovado',
      'pending':  'pendente',
      'rejected': 'recusado',
      'null':     'pendente'
    }

    const novoStatus = statusMap[status] ||
                       statusMap[collectionStatus] ||
                       'pendente'

    try {
      const { error } = await db
        .from('pedidos')
        .update({
          status:        novoStatus,
          mp_payment_id: paymentId
        })
        .eq('id', externalRef)

      if (error) {
        console.error('Erro ao atualizar pedido:', error)
      } else {
        console.log('Pedido atualizado:', novoStatus)
      }
    } catch (err) {
      console.error('Erro:', err)
    }
  }

  // Executa assim que a página carrega
  atualizarPedido()
  </script>
</body>

</html>
