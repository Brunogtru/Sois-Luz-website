<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Gestão de Produtos — Sois Luz</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/admin.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="admin-layout">
    
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar__topo">
        <a href="dashboard.html" class="admin-logo">
          Sois Luz
        </a>
        <div class="admin-user">
          <div class="admin-avatar" id="admin-avatar">TL</div>
          <div class="admin-user__info">
            <span class="admin-user__nome" id="admin-nome">Carregando...</span>
            <span class="admin-user__nivel" id="admin-nivel"></span>
          </div>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="dashboard.html" class="admin-nav__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Dashboard
        </a>
        <a href="pedidos.html" class="admin-nav__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Pedidos
          <span class="admin-nav__badge" id="badge-pedidos"></span>
        </a>
        <a href="inscricoes.html" class="admin-nav__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Inscrições
          <span class="admin-nav__badge" id="badge-inscricoes"></span>
        </a>
        <div class="admin-nav__separador"></div>
        <a href="eventos.html" class="admin-nav__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Eventos
        </a>
        <a href="produtos.html" class="admin-nav__link ativo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Produtos
        </a>
        <a href="equipe.html" class="admin-nav__link" id="menu-equipe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Equipe
        </a>
      </nav>

      <div class="admin-sidebar__rodape">
        <button class="admin-logout" id="btn-logout" onclick="adminLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair da conta
        </button>
      </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="admin-main">
      
      <!-- Header da Página -->
      <div class="admin-page-header">
        <div class="admin-page-header__esquerda">
          <h1 class="admin-page-titulo">Gestão de Produtos</h1>
          <span class="admin-page-sub" id="total-registros">0 produtos registrados</span>
        </div>
        <button class="btn-primario" id="btn-novo-produto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>+ Novo Produto</span>
        </button>
      </div>

      <!-- Área de Conteúdo Específico -->
      <div class="admin-content">
        
        <!-- Cards de Resumo Rápido -->
        <section class="admin-stats-grid" aria-label="Métricas de produtos" style="grid-template-columns: repeat(3, 1fr);">
          
          <div class="admin-stat">
            <div class="admin-stat__header">
              <span class="admin-stat__label">Produtos Ativos</span>
              <div class="admin-stat__icone" style="background: rgba(22,101,52,0.08);">
                <svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
              </div>
            </div>
            <span class="admin-stat__valor" id="stat-ativos">0</span>
          </div>

          <div class="admin-stat">
            <div class="admin-stat__header">
              <span class="admin-stat__label">Unidades Vendidas</span>
              <div class="admin-stat__icone" style="background: rgba(30,64,175,0.08);">
                <svg viewBox="0 0 24 24" fill="none" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              </div>
            </div>
            <span class="admin-stat__valor" id="stat-vendidos">0</span>
          </div>

          <div class="admin-stat">
            <div class="admin-stat__header">
              <span class="admin-stat__label">Faturamento da Loja</span>
              <div class="admin-stat__icone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              </div>
            </div>
            <span class="admin-stat__valor" id="stat-receita-produtos">R$ 0,00</span>
          </div>

        </section>

        <!-- Grid de Cards de Produtos -->
        <div class="admin-produtos-grid" id="produtos-grid">
          <div class="admin-card__empty" style="grid-column: 1/-1;">
            Carregando produtos do Supabase...
          </div>
        </div>

      </div>

    </main>

  </div>

  <!-- Modal Criar / Editar Produto -->
  <div class="admin-modal-overlay" id="produto-modal">
    <div class="admin-modal">
      
      <header class="admin-modal__header">
        <h3 class="admin-modal__titulo" id="modal-titulo">Novo Produto</h3>
        <button class="admin-modal__fechar" id="btn-fechar-modal" aria-label="Fechar formulário">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>

      <form id="form-produto" class="admin-modal__body" novalidate style="padding: 0;">
        <div style="padding: var(--space-7); display: flex; flex-direction: column; gap: var(--space-5);">
          <input type="hidden" id="produto-id">

          <div class="admin-form__grupo">
            <label class="admin-form__label" for="produto-nome">Nome do Produto <span>*</span></label>
            <input class="admin-form__input" type="text" id="produto-nome" placeholder="Ex: Diário Devocional Sois Luz" required>
          </div>

          <div class="admin-form__grupo">
            <label class="admin-form__label" for="produto-desc">Descrição Detalhada <span>*</span></label>
            <textarea class="admin-form__textarea" id="produto-desc" placeholder="Descreva os materiais, tamanho, propósitos do produto..." required></textarea>
          </div>

          <div class="admin-form__row">
            <div class="admin-form__grupo">
              <label class="admin-form__label" for="produto-preco">Preço (R$) <span>*</span></label>
              <input class="admin-form__input" type="number" step="0.01" id="produto-preco" placeholder="0,00" required>
            </div>
            <div class="admin-form__grupo">
              <label class="admin-form__label" for="produto-badge">Etiqueta Destaque (Badge)</label>
              <input class="admin-form__input" type="text" id="produto-badge" placeholder="Ex: Mais Vendido, Lançamento">
            </div>
          </div>

          <div class="admin-form__grupo">
            <label class="admin-form__label" for="produto-imagem">URL da Imagem do Produto</label>
            <input class="admin-form__input" type="text" id="produto-imagem" placeholder="https://exemplo.com/produto.jpg">
          </div>

          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="produto-ativo" checked>
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Disponibilizar na Loja (Ativo)</span>
          </div>
        </div>

        <div class="admin-modal__footer">
          <button class="btn-secundario" type="button" onclick="fecharModal()">Cancelar</button>
          <button class="btn-primario" type="submit">Salvar Produto</button>
        </div>

      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/supabase-client.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-produtos.js"></script>
</body>
</html>
